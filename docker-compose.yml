services:

  qdrant:
    image: qdrant/qdrant:v1.11.3
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    # 不对外暴露，只供 gateway 内网访问

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       memory_db
      POSTGRES_USER:     memory_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # 不对外暴露

  rsshub:
    image: diygod/rsshub:latest
    restart: unless-stopped
    environment:
      NODE_ENV:      production
      CACHE_TYPE:    memory
      CACHE_EXPIRE:  600          # 10 min cache per feed
      DISALLOW_ROBOT: "1"         # 不收录搜索引擎
    # 不对外暴露，只供 gateway 内网访问

  gateway:
    build: ./gateway
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"   # 只绑本地，由 nginx 反代
      - "0.0.0.0:8088:8000"     # MCP clients direct access
    env_file:
      - .env                    # 自动透传所有 PROVIDER_API_KEY / AGENT_* / API_CHAIN_* 变量
    environment:
      POSTGRES_DSN:  postgresql://memory_user:${POSTGRES_PASSWORD}@postgres:5432/memory_db
      QDRANT_URL:    http://qdrant:6333
      HEALTH_MCP_URL: http://172.17.0.1:8100   # host systemd health-api service
      RSSHUB_URL:    http://rsshub:1200         # 自建 RSSHub，替代 rsshub.app
    volumes:
      - ./backups:/app/backups
      - ./gateway/static:/app/static
      - gateway_data:/app/data
    depends_on:
      - qdrant
      - postgres
      - rsshub

  sillytavern:
    image: ghcr.io/sillytavern/sillytavern:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:7860:8000"   # 只绑本地，由 nginx 反代
    volumes:
      - st_data:/home/node/app/data
      - st_config:/home/node/app/config
    environment:
      - LISTEN=0.0.0.0          # 允许容器内所有来源

  screentime:
    build: ./screentime
    restart: unless-stopped
    ports:
      - "127.0.0.1:8091:3000"   # nginx 反代 (HTTPS toggle for Shortcuts)
      - "0.0.0.0:8093:3000"     # MCP clients direct access
    environment:
      SCREENTIME_API_KEY: ${SCREENTIME_API_KEY}
      DB_PATH: /app/data/screentime.db
      MCP_MSG_PATH: /screentime/mcp/message   # nginx 路径重写补偿
    volumes:
      - screentime_data:/app/data

  spotify:
    build: ./spotify-mcp
    restart: unless-stopped
    ports:
      - "127.0.0.1:3012:3012"   # nginx 反代
    environment:
      SPOTIFY_MCP_PORT:       "3012"
      SPOTIFY_CLIENT_ID:      ${SPOTIFY_CLIENT_ID:-}
      SPOTIFY_CLIENT_SECRET:  ${SPOTIFY_CLIENT_SECRET:-}
      SPOTIFY_REFRESH_TOKEN:  ${SPOTIFY_REFRESH_TOKEN:-}

volumes:
  gateway_data:
  qdrant_data:
  postgres_data:
  st_data:
  st_config:
  screentime_data:

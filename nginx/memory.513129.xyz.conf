# memory.513129.xyz — 记忆网关 + 管理面板
# 初次部署先用 HTTP，certbot 会自动改写为 HTTPS

server {
    listen 80;
    listen [::]:80;
    server_name memory.513129.xyz;

    # Certbot 验证用
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name memory.513129.xyz;

    ssl_certificate     /etc/letsencrypt/live/memory.513129.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/memory.513129.xyz/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # 最大请求体（书籍上传用，PDF 可能较大）
    client_max_body_size 100m;

    # Screentime toggle（iPhone 快捷指令）+ MCP SSE
    location /screentime/ {
        proxy_pass         http://127.0.0.1:8091/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # MCP SSE 必须关闭缓冲，保持长连接
        proxy_set_header   Connection        '';
        proxy_buffering    off;
        chunked_transfer_encoding on;

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # OpenAI 兼容接口 + 管理 API
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # SSE / 流式输出必须关闭缓冲
        proxy_set_header   Connection        '';
        proxy_buffering    off;
        chunked_transfer_encoding on;

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
